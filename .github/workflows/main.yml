name: Travel Agent AI CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Κατεβάσαμε την έκδοση στην 3.12 για μέγιστη σταθερότητα με LangChain/Pydantic
          check-latest: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run Tests
        env:
          # Χρησιμοποιούμε dummy τιμή για να περάσει το αρχικό import του TavilyClient
          TAVILY_API_KEY: "dummy_test_key"
        run: |
          # Εκτέλεση των tests
          python -m pytest test_app.py